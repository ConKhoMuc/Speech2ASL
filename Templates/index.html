<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speech To Sign Language</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.card{
border-radius:15px;
}

video{
width:100%;
border-radius:10px;
}

.loading{
display:none;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">
<h3>Speech To Sign Language</h3>
</div>

<div class="card-body">

<div class="text-center mb-3">

<button id="recordBtn" class="btn btn-danger">
🎤 Record
</button>

<button id="stopBtn" class="btn btn-secondary">
⏹ Stop
</button>

</div>

<div class="text-center">

<audio id="audioPlayer" controls></audio>

</div>

<hr>

<div class="d-grid">
<button class="btn btn-primary" onclick="uploadAudio()">
Convert To Sign
</button>
</div>

<hr>

<div class="text-center loading" id="loading">

<div class="spinner-border text-primary"></div>

<p>Processing...</p>

</div>

<div id="result" style="display:none">

<h5>Recognized Text</h5>
<div class="alert alert-info" id="text"></div>

<h5>NLP Structure</h5>
<div class="alert alert-warning" id="nlp"></div>

<h5>Sign Video</h5>

<video id="video" controls autoplay></video>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const API = "http://localhost:8000"

let mediaRecorder
let audioChunks = []
let audioBlob

document.getElementById("recordBtn").onclick = async () => {

let stream = await navigator.mediaDevices.getUserMedia({audio:true})

mediaRecorder = new MediaRecorder(stream)

mediaRecorder.start()

audioChunks = []

mediaRecorder.ondataavailable = e=>{
audioChunks.push(e.data)
}

mediaRecorder.onstop = ()=>{

audioBlob = new Blob(audioChunks,{type:"audio/wav"})

let audioURL = URL.createObjectURL(audioBlob)

document.getElementById("audioPlayer").src = audioURL

}

}

document.getElementById("stopBtn").onclick = ()=>{

mediaRecorder.stop()

}

function uploadAudio(){

if(!audioBlob){
alert("Record first")
return
}

let formData = new FormData()

formData.append("audio", audioBlob,"record.wav")

document.getElementById("loading").style.display="block"
document.getElementById("result").style.display="none"

fetch(API + "/upload_audio",{

method:"POST",
body:formData

})
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none"

if(data.error){

alert(data.error)
return

}

document.getElementById("result").style.display="block"

document.getElementById("text").innerText = data.text

document.getElementById("nlp").innerText = data.nlptext

let video = document.getElementById("video")

video.src = API + "/" + data.video

video.load()

video.play()

})
.catch(err=>{

document.getElementById("loading").style.display="none"

alert(err)

})

}

</script>

</body>

</html>
```
